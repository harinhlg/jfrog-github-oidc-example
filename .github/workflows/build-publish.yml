name: "JFrog Docker Publish"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: my-app
      JFROG_DOCKER_REPO: 418949-docker-local

    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: harish
          oidc-audience: jfrog-github

      # IMPORTANT FIX
      - name: Set Registry (MUST include /artifactory)
        run: |
          echo "REGISTRY=hts2.jfrog.io/artifactory" >> $GITHUB_ENV

      - name: Build Image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      - name: Tag Image
        run: |
          docker tag ${IMAGE_NAME}:${{ github.sha }} \
          ${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      - name: Docker Login via JFrog
        run: |
          jf docker login ${REGISTRY}

      - name: Push Image
        run: |
          jf docker push \
          ${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      - name: Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
