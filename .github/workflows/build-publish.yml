name: "JFrog Docker OIDC Publish"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JFROG_URL: ${{ secrets.JF_URL }}
      JFROG_DOCKER_REPO: "418949-docker-local"
      IMAGE_NAME: "my-app"

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Setup JFrog CLI (OIDC)
      # -------------------------
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: harish
          oidc-audience: jfrog-github

      # -------------------------
      # Clean registry (REMOVE https + trailing slash)
      # -------------------------
      - name: Prepare Registry
        run: |
          REGISTRY=$(echo "$JFROG_URL" | sed 's|https://||' | sed 's|http://||' | sed 's|/$||')
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV

      # -------------------------
      # Docker build
      # -------------------------
      - name: Build Image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      # -------------------------
      # FIX: Full tag (IMPORTANT)
      # -------------------------
      - name: Tag Image
        run: |
          FULL_IMAGE=${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV
          docker tag ${IMAGE_NAME}:${{ github.sha }} $FULL_IMAGE

      # -------------------------
      # FIX: Docker login (REQUIRED)
      # -------------------------
      - name: Docker Login
        run: |
          jf docker login ${REGISTRY}

      # -------------------------
      # Push image
      # -------------------------
      - name: Push Image
        run: |
          jf docker push ${FULL_IMAGE}

      # -------------------------
      # Build info
      # -------------------------
      - name: Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
