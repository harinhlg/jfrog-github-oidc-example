name: JFrog Docker Publish

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: my-app
      REGISTRY: hts2-421414-docker-testing.jfrog.io

    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI (OIDC)
        id: setup
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER }}
          oidc-audience: ${{ secrets.ODIC_AUDIENCE }}

      - name: Verify login
        run: jf rt ping

      - name: Docker Login (OIDC)
        run: |
          echo "${{ steps.setup.outputs.oidc-token }}" | docker login $REGISTRY \
            -u "${{ steps.setup.outputs.oidc-user }}" \
            --password-stdin

      - name: Build amd64 image
        run: docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Push amd64 image
        run: docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Pull image back
        run: docker pull $REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Multi-Arch Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            --push \
            .
