name: "JFrog-GitHub Docker Publish OIDC Integration"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OIDC_AUDIENCE: "jfrog-github"
      OIDC_PROVIDER: "harish"
      JFROG_DOCKER_REPO: "418949-docker-local"
      IMAGE_NAME: "my-app"

      # IMPORTANT: your JFrog URL (with https)
      JFROG_URL: ${{ secrets.JF_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Setup JFrog CLI with OIDC
      # ----------------------------
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JFROG_CLI_LOG_LEVEL: DEBUG
        with:
          oidc-provider-name: ${{ env.OIDC_PROVIDER }}
          oidc-audience: ${{ env.OIDC_AUDIENCE }}

      - name: Show CLI version
        run: jf --version

      # ----------------------------
      # FIX: remove https:// for Docker
      # ----------------------------
      - name: Prepare Docker Registry
        run: |
          echo "REGISTRY=$(echo $JFROG_URL | sed 's|https://||' | sed 's|http://||')" >> $GITHUB_ENV

      # ----------------------------
      # Build Docker Image
      # ----------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      # ----------------------------
      # Tag Image for Artifactory
      # ----------------------------
      - name: Tag Docker Image
        run: |
          docker tag \
            ${IMAGE_NAME}:${{ github.sha }} \
            ${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      # ----------------------------
      # Push Docker Image using JFrog CLI
      # ----------------------------
      - name: Push Docker Image
        run: |
          jf docker push \
            ${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      # ----------------------------
      # Build Info
      # ----------------------------
      - name: Collect Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git

      - name: Publish Build Info
        run: |
          jf rt build-publish
