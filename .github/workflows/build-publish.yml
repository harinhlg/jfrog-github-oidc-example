name: "JFrog-GitHub Docker Publish OIDC Integration"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OIDC_AUDIENCE: "jfrog-github"
      OIDC_PROVIDER: "harish"
      JFROG_DOCKER_REPO: "418949-docker-local"
      IMAGE_NAME: "my-app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JFROG_CLI_LOG_LEVEL: DEBUG
        with:
          oidc-provider-name: ${{ env.OIDC_PROVIDER }}
          oidc-audience: ${{ env.OIDC_AUDIENCE }}

      - name: Verify JFrog CLI
        run: jf --version

      # -------------------------
      # BUILD DOCKER IMAGE
      # -------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      # -------------------------
      # TAG IMAGE FOR ARTIFACTORY
      # -------------------------
      - name: Tag Docker Image
        run: |
          docker tag \
            ${IMAGE_NAME}:${{ github.sha }} \
            ${{ secrets.JF_URL }}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      # -------------------------
      # PUSH IMAGE USING JFROG CLI
      # -------------------------
      - name: Push Docker Image
        run: |
          jf docker push \
            ${{ secrets.JF_URL }}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      # -------------------------
      # BUILD INFO
      # -------------------------
      - name: Collect Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git

      - name: Publish Build Info
        run: |
          jf rt build-publish
