name: "JFrog-GitHub Docker Publish OIDC Integration"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OIDC_AUDIENCE: "jfrog-github"
      OIDC_PROVIDER: "harish"
      JFROG_DOCKER_REPO: "418949-docker-local"
      IMAGE_NAME: "my-app"
      ARTIFACTORY_DOCKER_URL: ${{ secrets.JF_URL }}  # e.g. https://mycompany.jfrog.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JFROG_CLI_LOG_LEVEL: DEBUG
        with:
          oidc-provider-name: ${{ env.OIDC_PROVIDER }}
          oidc-audience: ${{ env.OIDC_AUDIENCE }}

      - name: Show JFrog CLI Version
        run: jf --version

      - name: Build Docker Image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      - name: Docker Login to JFrog
        run: |
          jf docker login ${ARTIFACTORY_DOCKER_URL}

      - name: Tag Docker Image for Artifactory
        run: |
          docker tag \
            ${IMAGE_NAME}:${{ github.sha }} \
            ${ARTIFACTORY_DOCKER_URL}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      - name: Push Docker Image using JFrog CLI
        run: |
          jf docker push \
            ${ARTIFACTORY_DOCKER_URL}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      - name: Collect Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git

      - name: Publish Build Info
        run: |
          jf rt build-publish
