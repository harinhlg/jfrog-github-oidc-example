name: "JFrog Docker Publish"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: my-app
      JFROG_DOCKER_REPO: 418949-docker-local
      REGISTRY: hts2.jfrog.io

    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        id: setup-jfrog-cli          # REQUIRED for oidc-user / oidc-token outputs
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}   # https://hts2.jfrog.io
          JFROG_CLI_OIDC_PROJECT_KEY: "devops"
          #JF_PROJECT: "devops"
        with:
          oidc-provider-name: harish
          oidc-audience: jfrog-github

      - name: Verify OIDC credentials exist
        run: |
          if [ -z "${{ steps.setup-jfrog-cli.outputs.oidc-user }}" ]; then
            echo "ERROR: oidc-user output is empty — OIDC token exchange failed"
            exit 1
          fi
          echo "OIDC user is set (value hidden)"

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.setup-jfrog-cli.outputs.oidc-user }}
          password: ${{ steps.setup-jfrog-cli.outputs.oidc-token }}

      - name: Build Image
        run: docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      - name: Tag and Push Image
        run: |
          FULL_IMAGE="${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}"
          docker tag ${IMAGE_NAME}:${{ github.sha }} ${FULL_IMAGE}
          docker push ${FULL_IMAGE}

      - name: Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
          
