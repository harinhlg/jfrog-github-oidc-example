name: "JFrog-GitHub Docker Publish OIDC Integration"

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OIDC_AUDIENCE: "jfrog-github"
      OIDC_PROVIDER: "harish"
      JFROG_DOCKER_REPO: "418949-docker-local"
      IMAGE_NAME: "my-app"

      # IMPORTANT: keep full URL here
      JFROG_URL: ${{ secrets.JF_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # JFrog OIDC Setup
      # -----------------------------
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JFROG_CLI_LOG_LEVEL: DEBUG
        with:
          oidc-provider-name: ${{ env.OIDC_PROVIDER }}
          oidc-audience: ${{ env.OIDC_AUDIENCE }}

      - name: Show JFrog CLI Version
        run: jf --version

      # -----------------------------
      # FIX REGISTRY (REMOVES https + trailing /)
      # -----------------------------
      - name: Prepare Clean Registry
        run: |
          REGISTRY=$(echo "${JFROG_URL}" | sed 's|https://||' | sed 's|http://||' | sed 's|/$||')
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV

      - name: Debug Registry (optional)
        run: echo "REGISTRY=$REGISTRY"

      # -----------------------------
      # Build Docker Image
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} .

      # -----------------------------
      # Tag Image Correctly (NO // ANYMORE)
      # -----------------------------
      - name: Tag Docker Image
        run: |
          docker tag \
            ${IMAGE_NAME}:${{ github.sha }} \
            ${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      # -----------------------------
      # Push to JFrog (OIDC AUTH HANDLED AUTOMATICALLY)
      # -----------------------------
      - name: Push Docker Image
        run: |
          jf docker push \
            ${REGISTRY}/${JFROG_DOCKER_REPO}/${IMAGE_NAME}:${{ github.sha }}

      # -----------------------------
      # Build Info
      # -----------------------------
      - name: Collect Build Info
        run: |
          jf rt build-collect-env
          jf rt build-add-git

      - name: Publish Build Info
        run: |
          jf rt build-publish
